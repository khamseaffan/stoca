name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: Web app
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      AI_SERVICE_URL: http://localhost:8090
      ANTHROPIC_API_KEY: ci-anthropic-key
      NEXT_PUBLIC_POSTHOG_KEY: ci-posthog-key
      NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify web app
        run: npm run ci:web

  ai-service:
    name: AI service
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        working-directory: ai-service
        run: uv sync --frozen

      - name: Compile Python modules
        working-directory: ai-service
        run: uv run python -m compileall app

      - name: Import FastAPI app
        working-directory: ai-service
        run: uv run python -c "from app.main import app; print(app.title)"

      - name: Build service image
        run: docker build -t stoca-ai-service:ci ai-service
